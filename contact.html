<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | La Baleine</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group {
            margin-bottom: 2.5rem;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            background: #fdfdfd;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(0, 103, 192, 0.1);
        }

        @media (max-width: 768px) {
            .contact-section {
                padding: 4rem 0 !important;
            }

            form.card {
                padding: 2.5rem !important;
            }
        }

        @media (max-width: 480px) {
            form.card {
                padding: 1.5rem !important;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">LA BALEINE<span>.</span></a>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="mission.html">Mission</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="company.html">Company</a></li>
                <li><a href="contact.html" class="btn btn-primary" style="padding: 0.8rem 2rem;">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header"
            style="padding-top: 18rem; text-align: center; background: linear-gradient(to bottom, #f0f7ff, var(--bg-white));">
            <div class="container">
                <h1 class="reveal">CONTACT</h1>
                <p class="reveal" style="color: #000000; max-width: 600px; margin: 2rem auto; font-size: 1.1rem;">
                    あなたのビジネスのさらなる飛躍のために。まずはお気軽にご相談ください。
                </p>
            </div>
        </section>

        <section class="contact-section" style="padding: 8rem 0;">
            <div class="container" style="max-width: 800px;">
                <form class="reveal card" style="padding: 5rem; box-shadow: var(--shadow-lg);">
                    <div class="form-group">
                        <label>お名前</label>
                        <input type="text" placeholder="例：山田 太郎">
                    </div>
                    <div class="form-group">
                        <label>メールアドレス</label>
                        <input type="email" placeholder="example@labaleine.jp">
                    </div>
                    <div class="form-group">
                        <label>ご相談内容</label>
                        <textarea rows="6" placeholder="プロジェクトの概要や、現在お困りのことなどをご記入ください。"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.5rem;">送信する</button>
                </form>
            </div>
        </section>
    </main>

    <footer style="padding: 5rem 0; background: var(--text-primary); color: #ffffff;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4rem;">
                <div>
                    <a href="index.html" class="logo" style="color: #ffffff; font-size: 2rem;">LA
                        BALEINE<span>.</span></a>
                    <p style="margin-top: 1.5rem; color: rgba(255,255,255,0.6);">あなたの「伝えたい」を、もっと身近に。</p>
                </div>
                <div style="display: flex; gap: 6rem;">
                    <ul style="list-style: none;">
                        <li><a href="index.html" style="color: #ffffff; text-decoration: none;">HOME</a></li>
                        <li><a href="mission.html" style="color: #ffffff; text-decoration: none;">Mission</a></li>
                        <li><a href="services.html" style="color: #ffffff; text-decoration: none;">Services</a></li>
                    </ul>
                    <ul style="list-style: none;">
                        <li><a href="company.html" style="color: #ffffff; text-decoration: none;">Company</a></li>
                        <li><a href="contact.html" style="color: #ffffff; text-decoration: none;">Contact</a></li>
                    </ul>
                </div>
            </div>
            <div style="margin-top: 6rem; text-align: center; color: rgba(255,255,255,0.4);">&copy; 2026 La Baleine.
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
